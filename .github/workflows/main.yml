name: Build Kodi Android (arm32)

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发编译

jobs:
  build:runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf bison build-essential curl flex gawk git gperf lib32stdc++6 lib32z1lib32z1-dev libcurl4-openssl-dev unzip zip zlib1g-dev

      - name: Configure Android SDK & NDK
        # 利用 GitHub 运行器自带的 SDK，安装文档指定的 NDK 和 Build Tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Prepare existing debug.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$KEYSTORE_BASE64" | base64 --decode > ~/.android/debug.keystore

      - name: Build tools and dependencies (arm32)
        run: |
          cd tools/depends
          ./bootstrap
          # 架构已修改为 arm-linux-androideabi (arm32)
          ./configure --with-tarballs=$HOME/xbmc-tarballs \
                      --host=arm-linux-androideabi \
                      --with-sdk-path=$ANDROID_HOME \
                      --prefix=$HOME/xbmc-depends
          make -j$(nproc)

      - name: Configure and Build Kodi
        # 直接跳过了第六步(Build binary add-ons)，直接配置并编译 Kodi 主体
        run: |
          mkdir $HOME/kodi-build
          make -C tools/depends/target/cmakebuildsys BUILD_DIR=$HOME/kodi-build
          cd $HOME/kodi-build
          make -j$(nproc)

      - name: Package APK
        run: |
          cd $HOME/kodi-build
          make apk

      - name: Upload APK Artifactuses: actions/upload-artifact@v4
        with:
          name: kodi-android-arm32-apk
          path: ${{ github.workspace }}/*.apk
