name: Build Kodi for Android (ARM32)

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行
  push:
    branches:
      - master # 或者你当前的分支名

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install required packages
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf bison build-essential curl flex gawk git gperf lib32stdc++6 lib32z1 lib32z1-dev libcurl4-openssl-dev unzip zip zlib1g-dev- name: Setup Android SDK and NDK
      run: |
        mkdir -p $HOME/android-tools/android-sdk-linux
        # 下载 SDK 命令行工具
        wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip -d $HOME/android-tools/android-sdk-linux/
        
        # 自动接受许可并安装对应版本的 platform, build-tools 和 ndkcd $HOME/android-tools/android-sdk-linux/cmdline-tools/bin
        yes | ./sdkmanager --sdk_root=$HOME/android-tools/android-sdk-linux --licenses
        ./sdkmanager --sdk_root=$HOME/android-tools/android-sdk-linux platform-tools
        ./sdkmanager --sdk_root=$HOME/android-tools/android-sdk-linux "platforms;android-36"
        ./sdkmanager --sdk_root=$HOME/android-tools/android-sdk-linux "build-tools;36.0.0"
        ./sdkmanager --sdk_root=$HOME/android-tools/android-sdk-linux "ndk;28.2.13676358"

    - name: Setup Debug Keystore from Secrets
      # 读取你配置的 DEBUG_KEYSTORE_BASE64，将其 Base64 解码并还原成 .keystore 文件
      run: |
        mkdir -p ~/.android
        echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore

    - name: Bootstrap andConfigure Dependencies (ARM 32-bit)
      # 这里配置了 arm-linux-androideabi，对应 ARM32
      run: |
        cd tools/depends
        ./bootstrap
        ./configure --with-tarballs=$HOME/android-tools/xbmc-tarballs --host=arm-linux-androideabi --with-sdk-path=$HOME/android-tools/android-sdk-linux --prefix=$HOME/android-tools/xbmc-depends

    - name: Build Dependencies
      run: |
        cd tools/depends
        make -j$(nproc)

    - name: Configure CMake build
      run: |
        make -C tools/depends/target/cmakebuildsys

    - name: Build Kodi
      run: |
        make -j$(nproc)

    - name: Package APK
      run: |
        make apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kodi-android-arm32-apk
        # 将生成的 APK 作为一个 Artifact 上传，编译完成后你可以直接在网页上下载
        path: "*.apk"
