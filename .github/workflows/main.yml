name: Build Kodi for Android (ARM32)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      ANT_VERSION: "1.10.15"
      ANDROID_PLATFORM: "android-36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "28.2.13676358"
      KODI_HOST: "arm-linux-androideabi"

    steps:
      - name: 1. Checkout Kodi source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          path: kodi
          fetch-depth: 1
          submodules: recursive

      - name: 2. Install required packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake autopoint bison build-essential cmake curl flex gawk \
            gettext git gperf libcurl4-openssl-dev libtool libtool-bin meson nasm \
            ninja-build patch pkg-config python3 python3-setuptools rsync unzip wget \
            yasm zip zlib1g-dev

      - name: 3. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 3.1 Install Apache Ant manually
        run: |
          set -euxo pipefail
          cd "$HOME"
          wget "https://archive.apache.org/dist/ant/binaries/apache-ant-${ANT_VERSION}-bin.tar.gz"
          tar -xzf "apache-ant-${ANT_VERSION}-bin.tar.gz"
          echo "$HOME/apache-ant-${ANT_VERSION}/bin" >> "$GITHUB_PATH"
          echo "ANT_HOME=$HOME/apache-ant-${ANT_VERSION}" >> "$GITHUB_ENV"

      - name: 3.2 Verify Java and Ant
        run: |
          set -euxo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          which java
          java -version
          which javac
          javac -version
          type -a ant
          which ant
          ant -version
          ant -diagnostics | sed -n '1,120p'

      - name: 4. Restore or Generate Debug Keystore
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -euxo pipefail
          mkdir -p ~/.android
          if [ -n "${DEBUG_KEYSTORE:-}" ]; then
            echo "$DEBUG_KEYSTORE" | base64 --decode > ~/.android/debug.keystore
            echo "Debug keystore restored from secret."
          else
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Debug keystore generated."
          fi

      - name: 5. Download and Configure Android SDK & NDK
        run: |
          set -euxo pipefail

          SDK_ROOT="$HOME/android-tools/android-sdk-linux"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          mkdir -p "$HOME/android-tools/xbmc-tarballs"

          cd "$RUNNER_TEMP"
          wget "https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip" -O cmdline-tools.zip

          rm -rf cmdline-tools-unpack
          mkdir -p cmdline-tools-unpack
          unzip -q cmdline-tools.zip -d cmdline-tools-unpack

          rm -rf "$SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools-unpack/cmdline-tools "$SDK_ROOT/cmdline-tools/latest"

          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          # 这里不能带 pipefail，不然 yes 会因为 SIGPIPE 让整步失败
          set +o pipefail
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" --licenses
          set -o pipefail

          "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" --verbose \
            "platform-tools" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: 5.1 Verify Android SDK / NDK
        run: |
          set -euxo pipefail
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          type -a sdkmanager
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --list_installed | sed -n '1,200p'
          ls -la "$ANDROID_NDK_HOME"

      - name: 6. Build tools and dependencies (ARM32)
        run: |
          set -euxo pipefail
          type -a ant
          ant -version

          cd "${{ github.workspace }}/kodi/tools/depends"
          ./bootstrap
          ./configure \
            --with-tarballs="$HOME/android-tools/xbmc-tarballs" \
            --host="${KODI_HOST}" \
            --with-sdk-path="$ANDROID_SDK_ROOT" \
            --prefix="$HOME/android-tools/xbmc-depends"

          env -u CLASSPATH make -j"$(nproc)"

      - name: 7. Configure and Build Kodi
        run: |
          set -euxo pipefail
          type -a ant
          ant -version

          cd "${{ github.workspace }}/kodi"
          mkdir -p "$HOME/kodi-build"
          make -C tools/depends/target/cmakebuildsys BUILD_DIR="$HOME/kodi-build"

          cd "$HOME/kodi-build"
          env -u CLASSPATH make -j"$(nproc)"

      - name: 8. Package APK
        run: |
          set -euxo pipefail
          cd "$HOME/kodi-build"
          env -u CLASSPATH make apk

      - name: 9. Upload Artifact (Save APK)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: Kodi-Android-ARM32-APK
          path: |
            /home/runner/kodi-build/*.apk
            ${{ github.workspace }}/kodi/*.apk
            ${{ github.workspace }}/kodi/build/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Debug Ant / Java / Android
        if: ${{ always() }}
        run: |
          set +e
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANT_HOME=$ANT_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "CLASSPATH=$CLASSPATH"
          env | grep -E '^(JAVA|ANT|ANDROID|CLASSPATH)' || true
          type -a java || true
          type -a javac || true
          type -a ant || true
          type -a sdkmanager || true
          java -version || true
          javac -version || true
          ant -version || true
          ant -diagnostics | sed -n '1,200p' || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --list_installed | sed -n '1,200p' || true
          find "$HOME" -maxdepth 4 -type f -name "*.apk" 2>/dev/null || true
